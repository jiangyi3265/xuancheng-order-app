name: Deploy frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOMAIN: kejifeipf.top
  SITE_DIR: /www/wwwroot/kejifeipf.top
  FALLBACK_SITE_DIR: /www/wwwroot/kejiht.feipf.top/client
  ARCHIVE: frontend-dist.tar.gz
  FALLBACK_ARCHIVE: frontend-client-dist.tar.gz
  REMOTE_TMP: /tmp/xuancheng-frontend-${{ github.run_id }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack dist
        run: tar -czf "$ARCHIVE" -C dist .

      - name: Build fallback under admin domain
        run: |
          VITE_BASE=/client/ npm run build
          tar -czf "$FALLBACK_ARCHIVE" -C dist .

      - name: Upload primary dist archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: ${{ env.ARCHIVE }}
          target: ${{ env.REMOTE_TMP }}
          overwrite: true

      - name: Upload fallback dist archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: ${{ env.FALLBACK_ARCHIVE }}
          target: ${{ env.REMOTE_TMP }}
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOMAIN: ${{ env.DOMAIN }}
          SITE_DIR: ${{ env.SITE_DIR }}
          FALLBACK_SITE_DIR: ${{ env.FALLBACK_SITE_DIR }}
          ARCHIVE: ${{ env.ARCHIVE }}
          FALLBACK_ARCHIVE: ${{ env.FALLBACK_ARCHIVE }}
          REMOTE_TMP: ${{ env.REMOTE_TMP }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DOMAIN,SITE_DIR,FALLBACK_SITE_DIR,ARCHIVE,FALLBACK_ARCHIVE,REMOTE_TMP
          script: |
            set -e
            mkdir -p "$SITE_DIR"
            find "$SITE_DIR" -mindepth 1 -maxdepth 1 ! -name '.user.ini' -exec rm -rf {} +
            tar -xzf "$REMOTE_TMP/$ARCHIVE" -C "$SITE_DIR"

            mkdir -p "$FALLBACK_SITE_DIR"
            find "$FALLBACK_SITE_DIR" -mindepth 1 -maxdepth 1 ! -name '.user.ini' -exec rm -rf {} +
            tar -xzf "$REMOTE_TMP/$FALLBACK_ARCHIVE" -C "$FALLBACK_SITE_DIR"
            rm -rf "$REMOTE_TMP"

            NGINX_CONF_DIR=/etc/nginx/conf.d
            if [ -d /www/server/panel/vhost/nginx ]; then
              NGINX_CONF_DIR=/www/server/panel/vhost/nginx
            else
              mkdir -p "$NGINX_CONF_DIR"
            fi

            cat > "$NGINX_CONF_DIR/$DOMAIN.conf" <<NGINX
            server {
                listen 80;
                server_name $DOMAIN www.$DOMAIN;

                client_max_body_size 50m;
                root $SITE_DIR;
                index index.html;

                location / {
                    try_files \$uri \$uri/ /index.html;
                }

                location /jiedan/ {
                    proxy_pass http://127.0.0.1:8091;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                location /login {
                    proxy_pass http://127.0.0.1:8091;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                location /captchaImage {
                    proxy_pass http://127.0.0.1:8091;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINX

            nginx -t
            systemctl reload nginx
